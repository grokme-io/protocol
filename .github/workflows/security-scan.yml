name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  tests:
    name: Hardhat Tests (145)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx hardhat test

  aderyn:
    name: Aderyn Static Analysis (Cyfrin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Aderyn CLI
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/Cyfrin/aderyn/releases/latest/download/aderyn-installer.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run Aderyn
        run: aderyn --output report.md . 2>&1 || true

      - name: Upload Aderyn Report
        uses: actions/upload-artifact@v4
        with:
          name: aderyn-security-report
          path: report.md
          if-no-files-found: warn
          retention-days: 90

      - name: Pin Aderyn report (MD) to IPFS via Pinata
        if: hashFiles('report.md') != ''
        id: ipfs_md
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.PINATA_JWT }}" \
            -F "file=@report.md;filename=aderyn-report-${{ github.sha }}.md" \
            https://api.pinata.cloud/pinning/pinFileToIPFS)
          echo "Pinata MD response: $RESPONSE"
          HASH=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['IpfsHash'])" 2>/dev/null || echo "")
          if [ -n "$HASH" ]; then
            echo "ipfs_hash=$HASH" >> $GITHUB_OUTPUT
          fi

      - name: Pin audit report page (HTML) to IPFS via Pinata
        id: ipfs_html
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.PINATA_JWT }}" \
            -F "file=@docs/security/audit/index.html;filename=grokme-audit-report.html" \
            https://api.pinata.cloud/pinning/pinFileToIPFS)
          echo "Pinata HTML response: $RESPONSE"
          HASH=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['IpfsHash'])" 2>/dev/null || echo "")
          if [ -n "$HASH" ]; then
            echo "ipfs_hash=$HASH" >> $GITHUB_OUTPUT
          fi

      - name: Print summary
        if: always()
        run: |
          echo "## GROKME Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.ipfs_html.outputs.ipfs_hash }}" ]; then
            echo "### 🔗 Audit Report Page (IPFS — shareable link)" >> $GITHUB_STEP_SUMMARY
            echo "https://gateway.pinata.cloud/ipfs/${{ steps.ipfs_html.outputs.ipfs_hash }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.ipfs_md.outputs.ipfs_hash }}" ]; then
            echo "### 📄 Raw Aderyn Report (IPFS)" >> $GITHUB_STEP_SUMMARY
            echo "https://gateway.pinata.cloud/ipfs/${{ steps.ipfs_md.outputs.ipfs_hash }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "---" >> $GITHUB_STEP_SUMMARY
          cat report.md >> $GITHUB_STEP_SUMMARY || echo "No report generated." >> $GITHUB_STEP_SUMMARY

  slither:
    name: Slither Static Analysis (Trail of Bits)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        with:
          node-version: '20'
          slither-args: >
            --filter-paths "contracts/archive,contracts/test,node_modules"
            --checklist
            --markdown-root "https://github.com/${{ github.repository }}/blob/${{ github.sha }}/"
        continue-on-error: true

      - name: Upload SARIF
        if: always() && steps.slither.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}
        continue-on-error: true

      - name: Slither summary
        if: always()
        run: |
          echo "## Slither Analysis" >> $GITHUB_STEP_SUMMARY
          echo "See job logs for full output." >> $GITHUB_STEP_SUMMARY

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [tests, aderyn, slither]
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "# GROKME Protocol — Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Hardhat Tests (145) | ${{ needs.tests.result == 'success' && '✅ All passing' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Aderyn (Cyfrin) | ${{ needs.aderyn.result == 'success' && '✅ Completed' || '⚠️ Check logs' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slither (Trail of Bits) | ${{ needs.slither.result == 'success' && '✅ Completed' || '⚠️ Check logs' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Contracts:** GrokNFT · GrokmeArena · GrokmeArenaTrophy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download Aderyn report from Artifacts above." >> $GITHUB_STEP_SUMMARY
