name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  workflow_dispatch:

jobs:
  tests:
    name: Hardhat Tests (145)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx hardhat test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
          if-no-files-found: ignore

  aderyn:
    name: Aderyn Static Analysis (Cyfrin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Aderyn
        run: |
          curl -L https://raw.githubusercontent.com/Cyfrin/aderyn/dev/cyfrinup/install | bash
          echo "$HOME/.cyfrin/bin" >> $GITHUB_PATH

      - name: Run Aderyn
        run: |
          cyfrinup
          aderyn . --output report.md --skip-update-check 2>&1 || true

      - name: Upload Aderyn Report
        uses: actions/upload-artifact@v4
        with:
          name: aderyn-report
          path: report.md
          retention-days: 90

      - name: Print summary
        run: cat report.md || echo "No report generated"

  slither:
    name: Slither Static Analysis (Trail of Bits)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        with:
          node-version: '20'
          slither-args: >
            --filter-paths "contracts/archive,contracts/test,node_modules"
            --checklist
            --markdown-root "https://github.com/${{ github.repository }}/blob/${{ github.sha }}/"
        continue-on-error: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}
        continue-on-error: true

      - name: Create Slither Summary
        if: always()
        run: |
          echo "## Slither Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat ${{ steps.slither.outputs.stdout }} >> $GITHUB_STEP_SUMMARY || echo "See logs above." >> $GITHUB_STEP_SUMMARY

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [tests, aderyn, slither]
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "# GROKME Protocol — Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Hardhat Tests (145) | ${{ needs.tests.result == 'success' && '✅ All passing' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Aderyn (Cyfrin) | ${{ needs.aderyn.result == 'success' && '✅ Completed' || '⚠️ Check logs' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slither (Trail of Bits) | ${{ needs.slither.result == 'success' && '✅ Completed' || '⚠️ Check logs' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Contracts:** GrokNFT · GrokmeArena · GrokmeArenaTrophy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download Aderyn report from Artifacts above." >> $GITHUB_STEP_SUMMARY
