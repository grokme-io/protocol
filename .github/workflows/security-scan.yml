name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pages: write
  id-token: write

jobs:
  tests:
    name: Hardhat Tests (145)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx hardhat test

  aderyn:
    name: Aderyn Static Analysis (Cyfrin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Aderyn CLI
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/Cyfrin/aderyn/releases/latest/download/aderyn-installer.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Aderyn — GrokmeArenaV2.sol
        run: aderyn --src contracts/GrokmeArenaV2.sol --output report-arena.md . 2>&1 || true

      - name: Aderyn — GrokmeArenaTrophy.sol
        run: aderyn --src contracts/GrokmeArenaTrophy.sol --output report-trophy.md . 2>&1 || true

      - name: Aderyn — GrokNFT.sol
        run: aderyn --src contracts/mainnet/GrokNFT.sol --output report-groknft.md . 2>&1 || true

      - name: Upload Aderyn Reports
        uses: actions/upload-artifact@v4
        with:
          name: aderyn-security-reports
          path: |
            report-arena.md
            report-trophy.md
            report-groknft.md
          if-no-files-found: warn
          retention-days: 90

      - name: Print summary
        if: always()
        run: |
          echo "## GROKME Security Audit — Aderyn (Cyfrin)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [grokme.io/security/audit](https://grokme.io/security/audit)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for CONTRACT in "GrokmeArenaV2:report-arena.md" "GrokmeArenaTrophy:report-trophy.md" "GrokNFT:report-groknft.md"; do
            NAME="${CONTRACT%%:*}"
            FILE="${CONTRACT##*:}"
            echo "### $NAME" >> $GITHUB_STEP_SUMMARY
            if [ -f "$FILE" ]; then
              grep "^| High\|^| Low\|^| Medium\|^| Critical" "$FILE" | head -4 >> $GITHUB_STEP_SUMMARY || true
            else
              echo "No report generated." >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### Full Reports" >> $GITHUB_STEP_SUMMARY
          for CONTRACT in "GrokmeArenaV2:report-arena.md" "GrokmeArenaTrophy:report-trophy.md" "GrokNFT:report-groknft.md"; do
            NAME="${CONTRACT%%:*}"
            FILE="${CONTRACT##*:}"
            echo "#### $NAME" >> $GITHUB_STEP_SUMMARY
            cat "$FILE" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No report." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

  slither:
    name: Slither Static Analysis (Trail of Bits)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        with:
          node-version: '20'
          slither-args: >
            --filter-paths "contracts/archive,contracts/test,contracts/GrokmeArena.sol,node_modules"
            --checklist
            --markdown-root "https://github.com/${{ github.repository }}/blob/${{ github.sha }}/"
        continue-on-error: true

      - name: Upload SARIF
        if: always() && steps.slither.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}
        continue-on-error: true

      - name: Slither summary
        if: always()
        run: |
          echo "## Slither Analysis" >> $GITHUB_STEP_SUMMARY
          echo "See job logs for full output." >> $GITHUB_STEP_SUMMARY

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [tests, aderyn, slither]
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "# GROKME Protocol — Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Hardhat Tests (145) | ${{ needs.tests.result == 'success' && '✅ All passing' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Aderyn (Cyfrin) | ${{ needs.aderyn.result == 'success' && '✅ Completed' || '⚠️ Check logs' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slither (Trail of Bits) | ${{ needs.slither.result == 'success' && '✅ Completed' || '⚠️ Check logs' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Contracts:** GrokmeArenaV2 · GrokmeArenaTrophy · GrokNFT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download Aderyn report from Artifacts above." >> $GITHUB_STEP_SUMMARY
